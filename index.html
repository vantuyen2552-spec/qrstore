<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tạo QR Code Miễn Phí</title>

<meta name="description" content="Tạo mã QR nhanh chóng cho link hoặc văn bản">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
width:90px;
margin-bottom:10px;
}

h1{
margin:10px 0;
}

input{
width:90%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:6px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e63950;
}

.download{
background:#4CAF50;
margin-left:5px;
}

#qrcode{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<img src="logotrang.png" class="logo">

<h1>Tạo QR Code</h1>

<p>Nhập nội dung hoặc link</p>

<input id="text" placeholder="Ví dụ: https://google.com hoặc Lê Văn Tuyến">

<br>

<button onclick="createQR()">Tạo QR</button>
<button class="download" onclick="downloadQR()">Tải QR</button>

<div id="qrcode"></div>

</div>

<script>

function createQR(){

var text=document.getElementById("text").value;

if(text==""){
alert("Hãy nhập nội dung");
return;
}

document.getElementById("qrcode").innerHTML="";

text = encodeURIComponent(text);

new QRCode(document.getElementById("qrcode"),{
text:text,
width:200,
height:200
});

}

function downloadQR(){

var img=document.querySelector("#qrcode img");

if(!img){
alert("Hãy tạo QR trước");
return;
}

var link=document.createElement("a");

link.href=img.src;
link.download="qr-code.png";
link.click();

}

</script>

</body>

</html>
