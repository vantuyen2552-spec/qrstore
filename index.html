<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>QR Tình Yêu</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family: Arial;
text-align:center;
color:white;
margin-top:80px;
}

.box{
background:white;
color:black;
width:320px;
padding:30px;
border-radius:15px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#ff4d6d;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

#qrcode{
margin-top:20px;
}

</style>
</head>

<body>

<h1>💖 QR Tình Yêu 💖</h1>

<div class="box">

<p>Nhập tên người bạn yêu</p>

<input id="name" placeholder="Ví dụ: Anh yêu em">

<br>

<button onclick="taoQR()">Tạo QR</button>

<div id="qrcode"></div>

</div>

<script>

function taoQR(){

document.getElementById("qrcode").innerHTML="";

var text=document.getElementById("name").value;

if(text==""){
alert("Hãy nhập nội dung");
return;
}

new QRCode(document.getElementById("qrcode"),{
text:text,
width:150,
height:150
});

}

</script>

</body>
</html>
