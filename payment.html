<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

.paybox{
margin-top:20px;
}

button{
margin:20px;
padding:14px 28px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

#qrcode{
margin-top:30px;
}

</style>

</head>

<body>

<h2>Thanh toán tạo QR</h2>

<p>Số tiền: <b>5000đ</b></p>

<button onclick="createQR()">Tôi đã thanh toán</button>

<div class="paybox">
<img src="https://img.vietqr.io/image/MB-0073206369999-compact.png?amount=5000&addInfo=WEBQR001" width="250">
</div>

<div id="qrcode"></div>

<script>

function createQR(){

let content = localStorage.getItem("qrcontent");

if(!content){
alert("Không có nội dung QR");
return;
}

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:content,
width:220,
height:220
});

}

</script>

</body>
</html>
